<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 🎂</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
color:white;
overflow:hidden;
}

.container{
margin-top:100px;
}

h1{
font-size:50px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b6e;
cursor:pointer;
margin-top:20px;
}

#cake{
font-size:80px;
margin-top:20px;
}

.heart{
position:fixed;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}
</style>

</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday! 🎉</h1>

<p>Today is all about you ✨</p>

<div id="cake">🎂</div>

<button onclick="blowCandle()">Blow the Candle 🕯</button>

<p id="message"></p>

</div>

<script>

function blowCandle(){

document.getElementById("cake").innerHTML="🎂✨";

document.getElementById("message").innerHTML=
"Happy Birthday! You are truly an amazing person. I hope your life is filled with happiness, success, and lots of smiles. Someone secretly wanted to make your day special today 💖";

confetti();

}

function confetti(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background="hsl("+Math.random()*360+",100%,50%)";

c.style.animationDuration=(Math.random()*2+2)+"s";

document.body.appendChild(c);

}

}

/* floating hearts */

setInterval(function(){

let heart=document.createElement("div");

heart.innerHTML="❤";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

},500);

</script>

</body>
</html>
